<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نسبة اخدمني</title>

  <!-- ✅ استدعاء خط Cairo -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #ff6600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.6rem;
      text-align: center;
      flex: 1;
    }

    /* ✅ مكان اللوجو في اليمين */
    .logo {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .logo img {
      height: 100px;
      width: auto;
    }

    .container { padding: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; }

    input, textarea, select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-family: 'Cairo', sans-serif;
    }

    button {
      background-color: #ff6600;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 1rem;
      margin-left: 0.5rem;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      transition: 0.3s;
    }

    button:hover {
      background-color: #e65c00;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 2rem;
      background: white;
      font-family: 'Cairo', sans-serif;
    }

    th, td {
      padding: 0.75rem;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background-color: #ff6600;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>نسبة اخدمني</h1>
    <!-- ✅ اللوجو في اليمين -->
    <div class="logo">
      <img src="490513000_618868401151095_4901961115467337186_n-removebg-preview.png" alt="لوجو اخدمني" />
    </div>
  </header>

  <div class="container">
    <form id="orderForm">
      <div class="form-row">
        <div class="form-group">
          <label for="store">اسم المحل</label>
          <select id="store">
            <option value="">-- اختر المحل --</option>
            <option>ابو يوسف</option>
            <option>العمده</option>
            <option>سليم</option>
            <option>مكس بوم</option>
            <option>علي كبده</option>
            <option>حلواني السلام</option>
            <option>مطعم بشندي</option>
            <option>المعلم سيد وحيد</option>
            <option>بيتزا حمزه</option>
            <option>برجر ع الفحم</option>
            <option>الرشيدي</option>
            <option>ماركت عبد العظيم</option>
            <option>ديعا ال ف القيساريه</option>
            <option>ماركت هيثم</option>
            <option>ماركت مينا</option>
            <option>المعلم حسام للخضراوات</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">المبلغ</label>
          <input type="number" id="amount" placeholder="0.00"/>
        </div>
      </div>

      <div class="form-group">
        <label for="order">تفاصيل الطلب</label>
        <textarea id="order" rows="3"></textarea>
      </div>

      <button type="button" id="submitBtn" onclick="addOrder()">إضافة الأوردر</button>
      <button type="button" onclick="downloadCSV()">تحميل الشيفت (CSV)</button>
      <button type="button" onclick="clearAll()">مسح الكل</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>المحل</th>
          <th>المبلغ</th>
          <th>تفاصيل الطلب</th>
          <th>النسبة</th>
          <th>العمولة</th>
          <th>تاريخ الأوردر</th>
          <th>تعديل</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>

  <script>
    let editingRow = null;

    function saveToLocalStorage() {
      const rows = Array.from(document.querySelectorAll("#ordersTable tr"));
      const data = rows.map(row =>
        Array.from(row.querySelectorAll("td")).slice(0,6).map(td => td.textContent)
      );
      localStorage.setItem("ordersData", JSON.stringify(data));
    }

    function loadFromLocalStorage() {
      const data = JSON.parse(localStorage.getItem("ordersData")) || [];
      data.forEach(vals => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${vals[0]}</td>
          <td>${vals[1]}</td>
          <td>${vals[2]}</td>
          <td>${vals[3]}</td>
          <td>${vals[4]}</td>
          <td>${vals[5]}</td>
          <td><button onclick="editOrder(this)">تعديل</button></td>
        `;
        document.getElementById('ordersTable').appendChild(row);
      });
    }

    function addOrder() {
      const store = document.getElementById('store').value;
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const order = document.getElementById('order').value.trim();
      const commission = 5;
      const commissionValue = (amount * commission / 100).toFixed(2);
      const orderDate = new Date().toLocaleString('ar-EG');

      if (!store) return alert("اختر اسم المحل أولاً");

      if (editingRow) {
        const cells = editingRow.querySelectorAll('td');
        cells[0].textContent = store;
        cells[1].textContent = amount.toFixed(2);
        cells[2].textContent = order;
        cells[3].textContent = commission + '%';
        cells[4].textContent = commissionValue;
        cells[5].textContent = orderDate;
        editingRow = null;
        submitBtn.textContent = 'إضافة الأوردر';
      } else {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${store}</td>
          <td>${amount.toFixed(2)}</td>
          <td>${order}</td>
          <td>${commission}%</td>
          <td>${commissionValue}</td>
          <td>${orderDate}</td>
          <td><button onclick="editOrder(this)">تعديل</button></td>
        `;
        document.getElementById('ordersTable').appendChild(tr);
      }

      document.getElementById('orderForm').reset();
      saveToLocalStorage();
    }

    function editOrder(btn) {
      const row = btn.closest('tr');
      const cells = row.querySelectorAll('td');
      document.getElementById('store').value = cells[0].textContent;
      document.getElementById('amount').value = cells[1].textContent;
      document.getElementById('order').value = cells[2].textContent;
      editingRow = row;
      submitBtn.textContent = 'تحديث الأوردر';
    }

    function clearAll() {
      localStorage.removeItem("ordersData");
      document.getElementById('ordersTable').innerHTML = '';
    }

    function downloadCSV() {
      const headers = ["اسم المحل","المبلغ","تفاصيل الطلب","النسبة","العمولة","تاريخ الأوردر"];
      const rows = [];
      const storeData = {};
      const totals = {count:0, comm:0};

      document.querySelectorAll("#ordersTable tr").forEach(r => {
        const cells = r.querySelectorAll('td');
        if (cells.length < 6) return;
        const rowVals = Array.from(cells).slice(0,6).map(td => td.textContent);
        rows.push(rowVals);
        const [st, am, , , commVal] = rowVals;
        totals.count++;
        totals.comm += parseFloat(commVal);
        storeData[st] = storeData[st] || {orders:[], count:0, total:0, commission:0};
        storeData[st].orders.push(rowVals);
        storeData[st].count++;
        storeData[st].total += parseFloat(am);
        storeData[st].commission += parseFloat(commVal);
      });

      const report = [["تقرير الشيفت"],["اسم المحل","عدد الأوردرات","إجمالي المبلغ","إجمالي العمولة"]];
      Object.entries(storeData).forEach(([s,v]) =>
        report.push([s, v.count, v.total.toFixed(2), v.commission.toFixed(2)])
      );
      report.push(["---","---","---","---"],["الإجمالي", totals.count, "", totals.comm.toFixed(2)],[""]);

      Object.entries(storeData).forEach(([s,v]) => {
        report.push([""], [`أوردرات ${s}`]);
        report.push(headers);
        v.orders.forEach(o => report.push(o));
      });

      const data = "\uFEFF" + report.map(r => r.join(";")).join("\n");
      const blob = new Blob([data], {type:"text/csv;charset=UTF-8"});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = "orders_shift_report.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    window.onload = loadFromLocalStorage;
  </script>
</body>
</html>
