<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نسبة اخدمني - لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; }
    header { background-color: #ff6600; color: white; display: flex; align-items: center; justify-content: center; position: relative; padding: 1rem; }
    header h1 { margin: 0; font-size: 1.6rem; text-align: center; flex: 1; }
    .logo { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); }
    .logo img { height: 100px; width: auto; }
    .container { padding: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
    input, textarea, select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 5px; font-family: 'Cairo', sans-serif; }
    .btn-group { margin-top: 1rem; display: flex; gap: 10px; flex-wrap: wrap; }
    button { color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 5px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 600; transition: 0.3s; }
    
    .btn-add { background-color: #ff6600; } .btn-add:hover { background-color: #e65c00; }
    .btn-csv { background-color: #28a745; }
    .btn-upload { background-color: #0d6efd; }
    .btn-report { background-color: #17a2b8; }
    .btn-clear { background-color: #dc3545; }
    .btn-cloud { background-color: #6f42c1; font-size: 1.1rem; } .btn-cloud:hover { background-color: #59339d; }

    table { width: 100%; border-collapse: collapse; margin-top: 2rem; background: white; font-family: 'Cairo', sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
    th, td { padding: 0.75rem; border: 1px solid #ddd; text-align: center; transition: 0.3s;}
    th { background-color: #ff6600; color: white; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 600px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .close-modal { background: none; color: #333; font-size: 1.5rem; padding: 0; cursor: pointer; }
    .summary-table th { background-color: #333; } 
    .total-row { font-weight: bold; background-color: #e9ecef; }
    .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

  <header>
    <h1>نسبة اخدمني - الإدارة المالية</h1>
    <div class="logo"><img src="490513000_618868401151095_4901961115467337186_n-removebg-preview.png" alt="لوجو اخدمني" onerror="this.style.display='none'" /></div>
  </header>

  <div class="container">
    <form id="orderForm">
      <div class="form-row">
        <div class="form-group">
          <label for="store">اسم المحل</label>
          <input type="text" id="store" list="storesDataList" placeholder="اسم المحل (اختياري)">
          <datalist id="storesDataList">
            <option value="ابو يوسف"><option value="العمده"><option value="مخبوزات الفتح">
            <option value="سليم"><option value="مكس بوم"><option value="عزت كبدة">
            <option value="ابو زين للمشويات"><option value="مجمدات ابو حمزة"><option value="طيور الصقر">
            <option value="الأرزاق بالله"><option value="حلواني السلام"><option value="مطعم بشندي">
            <option value="اسماك الاسكندرية"><option value="فلافي"><option value="ماتيو">
            <option value="المعلم سيد وحيد"><option value="بيتزا حمزه"><option value="علي مجدي">
            <option value="سري"><option value="المجانين"><option value="برجر ع الفحم">
            <option value="الرشيدي"><option value="مقلة الطيب"><option value="حلواني لادورية">
            <option value="ماركت عبد العظيم"><option value="ديعا ال ف القيساريه"><option value="ام ادهم سمك">
            <option value="ماركت مينا"><option value="المعلم حسام للخضراوات">
          </datalist>
        </div>
        <div class="form-group">
          <label for="amount">المبلغ (جنيه)</label>
          <input type="number" id="amount" placeholder="0.00"/>
        </div>
      </div>

      <div class="form-group">
        <label for="order">تفاصيل الطلب (انسخ هنا)</label>
        <textarea id="order" rows="3"></textarea>
      </div>

      <div class="btn-group">
        <button type="button" id="submitBtn" class="btn-add" onclick="addOrder()">إضافة الأوردر</button>
        <input type="file" id="csvUpload" accept=".csv" style="display:none;" onchange="handleFileUpload(event)">
        <button type="button" class="btn-upload" onclick="document.getElementById('csvUpload').click()">رفع شيت الأوردرات 📤</button>
        <button type="button" class="btn-report" onclick="showDailyReport()">📊 التقرير اليومي</button>
        <button type="button" class="btn-csv" onclick="downloadCSV()">📥 تحميل إكسيل</button>
        <button type="button" class="btn-cloud" onclick="uploadToServer()">☁️ ترحيل للسيرفر (B2B)</button>
        <button type="button" class="btn-clear" onclick="clearAll()">❌ مسح الكل</button>
      </div>
    </form>

    <table>
      <thead>
        <tr>
          <th>المحل</th>
          <th>المبلغ</th>
          <th>تفاصيل الطلب</th>
          <th>النسبة</th>
          <th>العمولة</th>
          <th>تاريخ الأوردر</th>
          <th>تعديل / حذف</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>

  <div class="modal-overlay" id="reportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>ملخص الشيفت اليومي</h2>
        <button class="close-modal" onclick="closeReport()">×</button>
      </div>
      <table class="summary-table" id="summaryTableElement">
        <thead><tr><th>اسم المحل</th><th>عدد الأوردرات</th><th>إجمالي المبلغ</th><th>إجمالي النسبة</th></tr></thead>
        <tbody id="reportBody"></tbody>
        <tfoot><tr class="total-row" id="grandTotalRow"></tr></tfoot>
      </table>
      <div class="modal-actions">
         <button onclick="copyReportText()" style="background:#25D366;">نسخ واتساب 📱</button>
         <button onclick="closeReport()" style="background:#333;">إغلاق</button>
      </div>
    </div>
  </div>

  <script>
    let editingRow = null;

    function normalizeArabic(text) { return text.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').toLowerCase(); }

    document.getElementById('order').addEventListener('input', function() {
        const text = normalizeArabic(this.value);
        const stores = Array.from(document.querySelectorAll('#storesDataList option')).map(opt => opt.value);
        for (let store of stores) {
            if (text.includes(normalizeArabic(store))) { document.getElementById('store').value = store; break; }
        }
    });

    function saveToLocalStorage() {
      const rows = Array.from(document.querySelectorAll("#ordersTable tr"));
      const data = rows.map(row => Array.from(row.querySelectorAll("td")).slice(0,6).map(td => td.textContent));
      localStorage.setItem("ordersData", JSON.stringify(data));
    }

    function loadFromLocalStorage() {
      const data = JSON.parse(localStorage.getItem("ordersData")) || [];
      data.forEach(vals => insertRow(vals));
    }

    function insertRow(vals) {
        const tr = document.createElement('tr');
        const rowStyle = vals[1] == "0" || vals[1] == "0.00" ? "background-color: #fff3cd;" : "";
        tr.style = rowStyle;
        const storeStyle = vals[0] === 'غير محدد' ? "background-color: #ffcccc; color: #a71d2a; font-weight: bold;" : "";

        tr.innerHTML = `
          <td style="${storeStyle}">${vals[0]}</td>
          <td style="font-weight:bold; color:#dc3545;">${vals[1]}</td>
          <td>${vals[2]}</td>
          <td>${vals[3]}</td>
          <td style="font-weight:bold;">${vals[4]}</td>
          <td style="font-size: 12px; color: #666;">${vals[5]}</td>
          <td style="display: flex; gap: 5px; justify-content: center;">
            <button onclick="editOrder(this)" style="padding:5px 10px; font-size:12px; background:#444; color:#fff; border:none; border-radius:3px; cursor:pointer;">تعديل ✏️</button>
            <button onclick="deleteOrder(this)" style="padding:5px 10px; font-size:12px; background:#dc3545; color:#fff; border:none; border-radius:3px; cursor:pointer;">حذف 🗑️</button>
          </td>
        `;
        document.getElementById('ordersTable').appendChild(tr);
    }

    function addOrder() {
      const store = document.getElementById('store').value.trim() || 'غير محدد';
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const order = document.getElementById('order').value.trim();
      const commission = 5; 
      const commissionValue = (amount * commission / 100).toFixed(2);
      const orderDate = new Date().toLocaleString('ar-EG');

      if (editingRow) {
        const cells = editingRow.querySelectorAll('td');
        cells[0].textContent = store;
        cells[0].style = store === 'غير محدد' ? "background-color: #ffcccc; color: #a71d2a; font-weight: bold;" : "";
        cells[1].textContent = amount.toFixed(2);
        cells[2].textContent = order;
        cells[3].textContent = commission + '%';
        cells[4].textContent = commissionValue;
        editingRow.style.backgroundColor = ""; 
        editingRow = null;
        document.getElementById('submitBtn').textContent = 'إضافة الأوردر';
      } else {
        insertRow([store, amount.toFixed(2), order, commission+'%', commissionValue, orderDate]);
      }
      document.getElementById('orderForm').reset();
      saveToLocalStorage();
    }

    function editOrder(btn) {
      const row = btn.closest('tr'); const cells = row.querySelectorAll('td');
      document.getElementById('store').value = cells[0].textContent !== 'غير محدد' ? cells[0].textContent : '';
      document.getElementById('amount').value = (cells[1].textContent === '0' || cells[1].textContent === '0.00') ? '' : cells[1].textContent;
      document.getElementById('order').value = cells[2].textContent;
      editingRow = row;
      document.getElementById('submitBtn').textContent = 'حفظ التعديل ✔️';
      if (cells[0].textContent === 'غير محدد') { document.getElementById('store').focus(); } else { document.getElementById('amount').focus(); }
    }

    function deleteOrder(btn) {
        if(confirm('متأكد إنك عاوز تحذف الأوردر ده نهائياً؟')) {
            const row = btn.closest('tr'); row.remove(); saveToLocalStorage(); 
            if(editingRow === row) { document.getElementById('orderForm').reset(); editingRow = null; document.getElementById('submitBtn').textContent = 'إضافة الأوردر'; }
        }
    }

    function clearAll() { if(confirm('متأكد من مسح كل البيانات؟')) { localStorage.removeItem("ordersData"); document.getElementById('ordersTable').innerHTML = ''; } }

    function handleFileUpload(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result; const rows = text.split("\n").slice(1); let addedCount = 0;
            rows.forEach(row => {
                if (row.trim() === "") return; const columns = row.split(";");
                if (columns.length >= 6) { insertRow([columns[0], columns[1], columns[2], columns[3], columns[4], columns[5]]); addedCount++; }
            });
            saveToLocalStorage(); alert(`تم استيراد ${addedCount} أوردر بنجاح!`);
        };
        reader.readAsText(file); event.target.value = '';
    }

    function downloadCSV() {
        const rows = [];
        document.querySelectorAll("#ordersTable tr").forEach(r => {
            const cells = r.querySelectorAll('td'); if (cells.length < 6) return;
            rows.push(Array.from(cells).slice(0,6).map(td => td.textContent));
        });
        if(rows.length === 0) return alert("لا توجد بيانات");
        const csvContent = "\uFEFF" + [["اسم المحل","المبلغ","تفاصيل الطلب","النسبة","العمولة","تاريخ الأوردر"], ...rows].map(e => e.join(";")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "shift_full_details.csv";
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function showDailyReport() {
        const reportData = {}; let grandTotalCount = 0; let grandTotalAmount = 0; let grandTotalCommission = 0;
        const rows = document.querySelectorAll("#ordersTable tr");
        if (rows.length === 0) return alert("لا توجد بيانات لعرض التقرير");

        rows.forEach(row => {
            const cells = row.querySelectorAll('td'); const storeName = cells[0].textContent;
            const amount = parseFloat(cells[1].textContent) || 0; const commissionVal = parseFloat(cells[4].textContent) || 0;
            if (!reportData[storeName]) { reportData[storeName] = { count: 0, totalAmount: 0, totalCommission: 0 }; }
            reportData[storeName].count += 1; reportData[storeName].totalAmount += amount; reportData[storeName].totalCommission += commissionVal;
            grandTotalCount++; grandTotalAmount += amount; grandTotalCommission += commissionVal;
        });

        const reportBody = document.getElementById('reportBody'); reportBody.innerHTML = ''; 
        Object.keys(reportData).forEach(store => {
            const data = reportData[store]; const tr = document.createElement('tr');
            tr.innerHTML = `<td>${store}</td><td>${data.count}</td><td>${data.totalAmount.toFixed(2)}</td><td style="font-weight:bold; color:#d63384;">${data.totalCommission.toFixed(2)}</td>`;
            reportBody.appendChild(tr);
        });

        document.getElementById('grandTotalRow').innerHTML = `<td>الإجمالي الكلي</td><td>${grandTotalCount}</td><td>${grandTotalAmount.toFixed(2)}</td><td>${grandTotalCommission.toFixed(2)}</td>`;
        document.getElementById('reportModal').style.display = 'flex';
    }

    function closeReport() { document.getElementById('reportModal').style.display = 'none'; }

    function copyReportText() {
        let text = "*تقرير الشيفت اليومي - نسبة اخدمني*\n\n";
        document.querySelectorAll("#reportBody tr").forEach(row => {
            const cols = row.querySelectorAll('td'); text += `🏪 *${cols[0].textContent}*\n   - عدد: ${cols[1].textContent} | مبلغ: ${cols[2].textContent} | عمولة: ${cols[3].textContent}\n`;
        });
        const totalRow = document.getElementById('grandTotalRow').querySelectorAll('td');
        text += `\n💰 *${totalRow[0].textContent}:* ${totalRow[3].textContent} جنيه`;
        navigator.clipboard.writeText(text).then(() => { alert("تم النسخ! جاهز للإرسال."); });
    }

    // ==========================================
    // الدالة السحرية: ترحيل الشغل لهوستنجر ☁️
    // ==========================================
    function uploadToServer() {
        const pass = prompt("أدخل الرقم السري للأدمن لترحيل البيانات للسيرفر:");
        if (pass !== '333') { alert("كلمة المرور خاطئة!"); return; }

        const rows = document.querySelectorAll("#ordersTable tr");
        if (rows.length === 0) { alert("الجدول فاضي! مفيش حاجة تترفع."); return; }

        const payload = { password: pass, orders: [] };

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            const amount = parseFloat(cells[1].textContent) || 0;
            const commVal = parseFloat(cells[4].textContent) || 0;
            
            payload.orders.push({
                store_name: cells[0].textContent,
                amount: amount,
                details: cells[2].textContent,
                comm_percent: cells[3].textContent,
                comm_value: commVal,
                net: amount - commVal, // الصافي للمحل
                date: cells[5].textContent
            });
        });

        // ⚠️ مهم جداً: غير الرابط ده للينك ملف الـ PHP بتاعك على هوستنجر
        const serverURL = 'https://3m-ls.com/orders-dash/save_financials.php';

        btn = document.querySelector('.btn-cloud');
        btn.textContent = 'جاري الرفع... ⏳';
        btn.disabled = true;

        fetch(serverURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.success) {
                alert(data.message);
                // اختياري: لو عاوز تمسح الجدول بعد الرفع شيل السلاش من السطر اللي تحت
                // clearAll(); 
            } else {
                alert('خطأ: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('حصلت مشكلة في الاتصال بالسيرفر. اتأكد من الرابط أو جرب تاني.');
        })
        .finally(() => {
            btn.textContent = '☁️ ترحيل للسيرفر (B2B)';
            btn.disabled = false;
        });
    }

    window.onload = loadFromLocalStorage;
  </script>
</body>
</html>
