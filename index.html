<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نسبة اخدمني - لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; }
    
    /* تنسيقات الشاشة العادية */
    header { background-color: #ff6600; color: white; display: flex; align-items: center; justify-content: center; position: relative; padding: 1rem; }
    header h1 { margin: 0; font-size: 1.6rem; text-align: center; flex: 1; }
    .logo { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); }
    .logo img { height: 100px; width: auto; }
    
    .container { padding: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
    input, textarea, select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 5px; font-family: 'Cairo', sans-serif; }
    
    .btn-group { margin-top: 1rem; display: flex; gap: 10px; flex-wrap: wrap; }
    button { color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 5px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 600; transition: 0.3s; }
    
    /* ألوان الأزرار */
    .btn-add { background-color: #ff6600; }
    .btn-add:hover { background-color: #e65c00; }
    .btn-csv { background-color: #28a745; }
    .btn-report { background-color: #17a2b8; }
    .btn-clear { background-color: #dc3545; }

    /* الجداول */
    table { width: 100%; border-collapse: collapse; margin-top: 2rem; background: white; font-family: 'Cairo', sans-serif; }
    th, td { padding: 0.75rem; border: 1px solid #ddd; text-align: center; }
    th { background-color: #ff6600; color: white; }

    /* --- تنسيقات المودال --- */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-content {
      background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 600px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; max-height: 90vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .close-modal { background: none; color: #333; font-size: 1.5rem; padding: 0; cursor: pointer; }
    
    /* تنسيق خاص لجدول التقرير */
    .summary-table th { background-color: #333; } 
    .total-row { font-weight: bold; background-color: #e9ecef; }

    .modal-actions {
        margin-top: 20px; 
        display: flex; 
        gap: 10px; 
        justify-content: center;
        flex-wrap: wrap;
    }

    /* --- تنسيقات الطباعة (عند الضغط على طباعة أو Ctrl+P) --- */
    @media print {
        body * { visibility: hidden; } /* إخفاء كل شيء */
        #reportModal, #reportModal * { visibility: visible; } /* إظهار المودال فقط */
        #reportModal { position: absolute; left: 0; top: 0; width: 100%; height: auto; background: none; }
        .modal-content { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        .modal-actions, .close-modal { display: none !important; } /* إخفاء الأزرار عند الطباعة */
    }
  </style>
</head>
<body>

  <header>
    <h1>نسبة اخدمني</h1>
    <div class="logo">
      <img src="490513000_618868401151095_4901961115467337186_n-removebg-preview.png" alt="لوجو اخدمني" />
    </div>
  </header>

  <div class="container">
    <form id="orderForm">
      <div class="form-row">
        <div class="form-group">
          <label for="store">اسم المحل</label>
          <select id="store">
            <option value="">-- اختر المحل --</option>
            <option>ابو يوسف</option>
            <option>العمده</option>
            <option>سليم</option>
            <option>مكس بوم</option>
            <option>علي كبده</option>
            <option>ماركت هيثم</option>
            <option>مجمدات ابو حمزة</option>
            <option>حلواني السلام</option>
            <option>مطعم بشندي</option>
            <option>اسماك الاسكندرية</option>
            <option>فلافي</option>
            <option>ماتيو</option>
            <option>المعلم سيد وحيد</option>
            <option>بيتزا حمزه</option>
            <option>علي مجدي</option>
            <option>سري</option>
            <option>المجانين</option>
            <option>برجر ع الفحم</option>
            <option>الرشيدي</option>
            <option>مقلة الطيب</option>
            <option>حلواني لادورية</option>
            <option>ماركت عبد العظيم</option>
            <option>ديعا ال ف القيساريه</option>
            <option>ماركت هيثم</option>
            <option>ماركت مينا</option>
            <option>المعلم حسام للخضراوات</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">المبلغ</label>
          <input type="number" id="amount" placeholder="0.00"/>
        </div>
      </div>

      <div class="form-group">
        <label for="order">تفاصيل الطلب</label>
        <textarea id="order" rows="3"></textarea>
      </div>

      <div class="btn-group">
        <button type="button" id="submitBtn" class="btn-add" onclick="addOrder()">إضافة الأوردر</button>
        <button type="button" class="btn-report" onclick="showDailyReport()">📊 التقرير اليومي</button>
        <button type="button" class="btn-csv" onclick="downloadCSV()">📥 تحميل الشيفت كامل</button>
        <button type="button" class="btn-clear" onclick="clearAll()">❌ مسح الكل</button>
      </div>
    </form>

    <table>
      <thead>
        <tr>
          <th>المحل</th>
          <th>المبلغ</th>
          <th>تفاصيل الطلب</th>
          <th>النسبة</th>
          <th>العمولة</th>
          <th>تاريخ الأوردر</th>
          <th>تعديل</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>

  <div class="modal-overlay" id="reportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>ملخص الشيفت اليومي</h2>
        <button class="close-modal" onclick="closeReport()">×</button>
      </div>
      
      <table class="summary-table" id="summaryTableElement">
        <thead>
          <tr>
            <th>اسم المحل</th>
            <th>عدد الأوردرات</th>
            <th>إجمالي المبلغ</th>
            <th>إجمالي النسبة</th>
          </tr>
        </thead>
        <tbody id="reportBody"></tbody>
        <tfoot>
            <tr class="total-row" id="grandTotalRow"></tr>
        </tfoot>
      </table>

      <div class="modal-actions">
         <button onclick="copyReportText()" style="background:#25D366;">نسخ واتساب 📱</button>
         <button onclick="downloadSummaryCSV()" style="background:#0d6efd;">تحميل Excel 📥</button>
         <button onclick="window.print()" style="background:#6c757d;">طباعة / PDF 🖨️</button>
         <button onclick="closeReport()" style="background:#333;">إغلاق</button>
      </div>
    </div>
  </div>

  <script>
    let editingRow = null;

    function saveToLocalStorage() {
      const rows = Array.from(document.querySelectorAll("#ordersTable tr"));
      const data = rows.map(row => 
        Array.from(row.querySelectorAll("td")).slice(0,6).map(td => td.textContent)
      );
      localStorage.setItem("ordersData", JSON.stringify(data));
    }

    function loadFromLocalStorage() {
      const data = JSON.parse(localStorage.getItem("ordersData")) || [];
      data.forEach(vals => insertRow(vals));
    }

    function insertRow(vals) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${vals[0]}</td>
          <td>${vals[1]}</td>
          <td>${vals[2]}</td>
          <td>${vals[3]}</td>
          <td>${vals[4]}</td>
          <td>${vals[5]}</td>
          <td><button onclick="editOrder(this)" style="padding:5px 10px; font-size:12px; background:#444; color:#fff; border:none; border-radius:3px; cursor:pointer;">تعديل</button></td>
        `;
        document.getElementById('ordersTable').appendChild(tr);
    }

    function addOrder() {
      const store = document.getElementById('store').value;
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const order = document.getElementById('order').value.trim();
      const commission = 5; 
      const commissionValue = (amount * commission / 100).toFixed(2);
      const orderDate = new Date().toLocaleString('ar-EG');

      if (!store) return alert("اختر اسم المحل أولاً");

      if (editingRow) {
        const cells = editingRow.querySelectorAll('td');
        cells[0].textContent = store;
        cells[1].textContent = amount.toFixed(2);
        cells[2].textContent = order;
        cells[3].textContent = commission + '%';
        cells[4].textContent = commissionValue;
        cells[5].textContent = orderDate;
        editingRow = null;
        document.getElementById('submitBtn').textContent = 'إضافة الأوردر';
      } else {
        insertRow([store, amount.toFixed(2), order, commission+'%', commissionValue, orderDate]);
      }

      document.getElementById('orderForm').reset();
      saveToLocalStorage();
    }

    function editOrder(btn) {
      const row = btn.closest('tr');
      const cells = row.querySelectorAll('td');
      document.getElementById('store').value = cells[0].textContent;
      document.getElementById('amount').value = cells[1].textContent;
      document.getElementById('order').value = cells[2].textContent;
      editingRow = row;
      document.getElementById('submitBtn').textContent = 'تحديث الأوردر';
    }

    function clearAll() {
      if(confirm('هل أنت متأكد من مسح كل البيانات؟')) {
        localStorage.removeItem("ordersData");
        document.getElementById('ordersTable').innerHTML = '';
      }
    }

    // --- دالة تحميل الشيفت الكامل (Raw Data) ---
    function downloadCSV() {
        const headers = ["اسم المحل","المبلغ","تفاصيل الطلب","النسبة","العمولة","تاريخ الأوردر"];
        const rows = [];
        document.querySelectorAll("#ordersTable tr").forEach(r => {
            const cells = r.querySelectorAll('td');
            if (cells.length < 6) return;
            rows.push(Array.from(cells).slice(0,6).map(td => td.textContent));
        });
        generateAndDownloadCSV(headers, rows, "shift_full_details.csv");
    }

    // --- دالة تحميل التقرير الملخص (Summary Data) ---
    function downloadSummaryCSV() {
        const headers = ["اسم المحل", "عدد الأوردرات", "إجمالي المبلغ", "إجمالي النسبة"];
        const rows = [];
        
        // جلب الصفوف من جدول التقرير
        document.querySelectorAll("#reportBody tr").forEach(r => {
            const cells = r.querySelectorAll('td');
            rows.push(Array.from(cells).map(td => td.textContent));
        });
        
        // إضافة صف الإجمالي
        const totalCells = document.querySelectorAll("#grandTotalRow td");
        if(totalCells.length > 0) {
             rows.push(["---","---","---","---"]);
             rows.push(Array.from(totalCells).map(td => td.textContent));
        }

        generateAndDownloadCSV(headers, rows, "daily_summary_report.csv");
    }

    // --- دالة مساعدة لإنشاء ملف CSV ---
    function generateAndDownloadCSV(headers, rows, filename) {
        if(rows.length === 0) return alert("لا توجد بيانات للتحميل");
        const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(";")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // --- منطق التقرير والعرض ---
    function showDailyReport() {
        const reportData = {};
        let grandTotalCount = 0;
        let grandTotalAmount = 0;
        let grandTotalCommission = 0;

        const rows = document.querySelectorAll("#ordersTable tr");
        if (rows.length === 0) return alert("لا توجد بيانات لعرض التقرير");

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            const storeName = cells[0].textContent;
            const amount = parseFloat(cells[1].textContent) || 0;
            const commissionVal = parseFloat(cells[4].textContent) || 0;

            if (!reportData[storeName]) {
                reportData[storeName] = { count: 0, totalAmount: 0, totalCommission: 0 };
            }

            reportData[storeName].count += 1;
            reportData[storeName].totalAmount += amount;
            reportData[storeName].totalCommission += commissionVal;

            grandTotalCount++;
            grandTotalAmount += amount;
            grandTotalCommission += commissionVal;
        });

        const reportBody = document.getElementById('reportBody');
        reportBody.innerHTML = ''; 

        Object.keys(reportData).forEach(store => {
            const data = reportData[store];
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${store}</td>
                <td>${data.count}</td>
                <td>${data.totalAmount.toFixed(2)}</td>
                <td style="font-weight:bold; color:#d63384;">${data.totalCommission.toFixed(2)}</td>
            `;
            reportBody.appendChild(tr);
        });

        document.getElementById('grandTotalRow').innerHTML = `
            <td>الإجمالي الكلي</td>
            <td>${grandTotalCount}</td>
            <td>${grandTotalAmount.toFixed(2)}</td>
            <td>${grandTotalCommission.toFixed(2)}</td>
        `;

        document.getElementById('reportModal').style.display = 'flex';
    }

    function closeReport() {
        document.getElementById('reportModal').style.display = 'none';
    }

    function copyReportText() {
        let text = "*تقرير الشيفت اليومي - نسبة اخدمني*\n\n";
        const rows = document.querySelectorAll("#reportBody tr");
        
        rows.forEach(row => {
            const cols = row.querySelectorAll('td');
            text += `🏪 *${cols[0].textContent}*\n`;
            text += `   - عدد: ${cols[1].textContent} | مبلغ: ${cols[2].textContent} | عمولة: ${cols[3].textContent}\n`;
        });

        const totalRow = document.getElementById('grandTotalRow').querySelectorAll('td');
        text += `\n💰 *${totalRow[0].textContent}:* ${totalRow[3].textContent} جنيه`;

        navigator.clipboard.writeText(text).then(() => {
            alert("تم النسخ! جاهز للإرسال.");
        });
    }

    window.onload = loadFromLocalStorage;
  </script>
</body>
</html>
